<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nền tảng Tinh lọc & Thẩm định Ngôn từ</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --surface: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #2980b9;
            --ai-prob-high: #fadbd8; /* Sắc đỏ nhạt cho từ vựng nặng tính máy móc */
            --ai-prob-med: #fcf3cf;  /* Sắc vàng cho sự lưỡng lự */
            --human-core: #d4efdf;   /* Sắc xanh cho tính người nguyên bản */
            --border: #e0e6ed;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-title h1 {
            font-size: 28px;
            font-weight: normal;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .header-title p {
            font-style: italic;
            color: var(--text-muted);
            margin: 0;
        }

        /* Kiến trúc Không gian Nhị nguyên */
        .workspace {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            height: 60vh;
            min-height: 500px;
        }

        .pane {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        .pane-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            background-color: #fcfcfc;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor {
            flex: 1;
            padding: 20px;
            font-size: 16px;
            line-height: 1.8;
            border: none;
            resize: none;
            outline: none;
            font-family: inherit;
            color: inherit;
            background: transparent;
        }

        /* Không gian hiển thị kết quả phân rã */
        .analysis-canvas {
            flex: 1;
            padding: 20px;
            font-size: 16px;
            line-height: 1.8;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* Thể hiện Bản thể qua màu sắc */
        .token {
            padding: 2px 0;
            border-radius: 3px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        
        .token:hover {
            filter: brightness(0.95);
        }

        .ai-high { background-color: var(--ai-prob-high); }
        .ai-med { background-color: var(--ai-prob-med); }
        .human { background-color: var(--human-core); }

        .action-bar {
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .btn-analyze {
            padding: 15px 40px;
            font-size: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s ease, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(41, 128, 185, 0.3);
        }

        .btn-analyze:hover {
            background-color: #2471a3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="header-title">
    <h1>Linguistic Logic & Ontology</h1>
    <p>Giải phẫu cấu trúc văn bản và khai phá dấu ấn của trí tuệ nhân tạo.</p>
</div>



<div class="workspace">
    <div class="pane">
        <div class="pane-header">
            <span>Bản Thảo Nguyên Thủy</span>
            <span id="wordCount">0 từ</span>
        </div>
        <textarea class="editor" id="sourceText" placeholder="Hãy nhập đoạn tiểu luận hoặc mã nguồn kèm bình luận của bạn vào đây. Hệ thống sẽ bóc tách từng hạt nhân ngôn ngữ..."></textarea>
    </div>

    <div class="pane">
        <div class="pane-header">
            <span>Giải Phẫu Nhận Thức (AI Detection & Refinement)</span>
            <span style="font-size: 12px;">Đỏ: Máy móc | Xanh: Con người</span>
        </div>
        <div class="analysis-canvas" id="analysisOutput">
            <span style="color: #999; font-style: italic;">Không gian tĩnh lặng chờ đợi sự hiển lộ của dữ liệu...</span>
        </div>
    </div>
</div>

<div class="action-bar">
    <button class="btn-analyze" onclick="performDeepAnalysis()">Tiến Hành Thẩm Định</button>
</div>

<script>
    // Kiến trúc Logic Vi mô (Micro-level Logic Architecture)
    
    document.getElementById('sourceText').addEventListener('input', function() {
        const text = this.value.trim();
        const words = text === "" ? 0 : text.split(/\s+/).length;
        document.getElementById('wordCount').innerText = `${words} từ`;
    });

    function performDeepAnalysis() {
        const rawText = document.getElementById('sourceText').value.trim();
        const outputCanvas = document.getElementById('analysisOutput');
        
        if (!rawText) return;

        // Phân rã văn bản thành mảng các từ vựng và khoảng trắng (bảo toàn cấu trúc)
        // Regex bóc tách từ vựng nhưng giữ lại dấu câu đi kèm
        const tokens = rawText.match(/(\S+|\s+)/g); 
        
        if (!tokens) return;

        let processedHTML = '';

        tokens.forEach(token => {
            // Giữ nguyên khoảng trắng và ký tự ngắt dòng
            if (/^\s+$/.test(token)) {
                processedHTML += token;
                return;
            }

            // XÓA BỎ KÝ TỰ ĐẶC BIỆT để đánh giá phần chữ cốt lõi
            const cleanWord = token.replace(/[.,!?;()]/g, '').toLowerCase();
            
            // Giả lập hệ thống đánh giá Perplexity tại tầng vi mô:
            // Trong hệ thống thực, mỗi 'cleanWord' sẽ được gửi tới C++ backend 
            // để đối chiếu với cấu trúc cây cú pháp nhằm xuất ra một tỷ lệ xác suất.
            
            let ontologyClass = '';
            
            // Heuristics mô phỏng: 
            // Các từ nối, từ chỉ cấu trúc logic hoàn hảo thường có tần suất xuất hiện cao trong văn bản AI.
            const aiHeavyWords = ['hơn thế nữa', 'tuy nhiên', 'có thể thấy', 'đóng vai trò', 'quan trọng', 'tóm lại', 'vì vậy'];
            const humanQuirks = ['đôi khi', 'thực sự', 'tôi', 'chúng ta', 'cảm giác', 'có lẽ', 'chắc hẳn', 'buồn'];

            let isMachineLike = Math.random() > 0.6; // Giả lập ngẫu nhiên cho từ vựng thường

            if (cleanWord.length > 7) {
                // Từ dài thường có khuynh hướng được AI dùng để tạo sự học thuật bề mặt
                ontologyClass = 'ai-med'; 
            }
            
            // Ghi đè bằng heuristics
            aiHeavyWords.forEach(w => { if (cleanWord.includes(w)) ontologyClass = 'ai-high'; });
            humanQuirks.forEach(w => { if (cleanWord.includes(w)) ontologyClass = 'human'; });

            // Trạng thái mặc định nếu không có dấu ấn rõ rệt
            if (!ontologyClass) ontologyClass = isMachineLike ? 'ai-med' : '';

            // Bọc (Wrap) token vào trong các thẻ span mang thuộc tính bản thể luận
            if (ontologyClass) {
                processedHTML += `<span class="token ${ontologyClass}" title="Nhấn để xem đề xuất tái cấu trúc">${token}</span>`;
            } else {
                processedHTML += token;
            }
        });

        outputCanvas.innerHTML = processedHTML;
    }
</script>

</body>
</html>
